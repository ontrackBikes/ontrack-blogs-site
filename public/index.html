<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ontrack Blogs</title>

  <!-- SEO -->
  <meta name="description" content="Explore latest bike rental blogs, tips, and guides from Ontrack." />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }
    .blog-card {
      transition: 0.2s;
      cursor: pointer;
    }
    .blog-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="container py-5">

  <h1 class="mb-4 text-center">🚀 Ontrack Blogs</h1>

  <div id="blogList" class="row g-4"></div>

  <!-- Pagination -->
  <nav class="mt-5">
    <ul id="pagination" class="pagination justify-content-center"></ul>
  </nav>

</div>

<script>
const BLOGS_PER_PAGE = 6;

function getPage() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get("page")) || 1;
}

function renderBlogs(blogs, page) {
  const container = document.getElementById("blogList");
  container.innerHTML = "";

  const start = (page - 1) * BLOGS_PER_PAGE;
  const paginated = blogs.slice(start, start + BLOGS_PER_PAGE);

  paginated.forEach(blog => {
    container.innerHTML += `
      <div class="col-md-4">
        <a href="/public${blog.url}" style="text-decoration:none; color:inherit;">
          <div class="card blog-card h-100 p-3">
            <h5>${blog.title}</h5>
            <p class="text-muted small">${new Date(blog.updatedAt).toDateString()}</p>
          </div>
        </a>
      </div>
    `;
  });
}

function renderPagination(totalBlogs, currentPage) {
  const totalPages = Math.ceil(totalBlogs / BLOGS_PER_PAGE);
  const pagination = document.getElementById("pagination");
  pagination.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    pagination.innerHTML += `
      <li class="page-item ${i === currentPage ? "active" : ""}">
        <a class="page-link" href="?page=${i}">${i}</a>
      </li>
    `;
  }
}

async function init() {
  try {
    const res = await fetch("/public/blogs.json");
    const blogs = await res.json();

    const page = getPage();

    renderBlogs(blogs, page);
    renderPagination(blogs.length, page);

  } catch (err) {
    document.getElementById("blogList").innerHTML = "<p>Error loading blogs</p>";
  }
}

init();
</script>

</body>
</html>
